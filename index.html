<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        
        body { margin: 0; background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        .tint-card { background-color: color-mix(in srgb, currentColor 5%, transparent); border: 1px solid color-mix(in srgb, currentColor 15%, transparent); }
        .tint-text { color: color-mix(in srgb, currentColor 70%, transparent); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- UI UTILS ---
        const InputField = ({ label, type="text", value, onChange, placeholder, isTextarea=false }) => (
            <div class="mb-4">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">{label}</label>
                {isTextarea ? (
                    <textarea class="w-full bg-slate-800/80 border border-slate-700 text-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" rows="3" value={value} onChange={onChange} placeholder={placeholder}/>
                ) : (
                    <input type={type} class="w-full bg-slate-800/80 border border-slate-700 text-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" value={value} onChange={onChange} placeholder={placeholder}/>
                )}
            </div>
        );

        const FileUpload = ({ fileData, onFileChange, label="Upload Image" }) => {
            const inputId = "file-upload-" + Math.random().toString(36).substr(2, 9);
            const load = e => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = () => onFileChange({ data: reader.result, name: file.name, isImage: file.type.startsWith('image/') });
                    reader.readAsDataURL(file);
                }
            };
            return (
                <div class="mb-4">
                    <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider">{label}</label>
                    <div class="flex items-center gap-3">
                        <label htmlFor={inputId} class="shrink-0 w-12 h-12 rounded bg-slate-800 border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden cursor-pointer hover:border-indigo-500 transition relative">
                            {fileData?.isImage ? <img src={fileData.data} class="absolute inset-0 w-full h-full object-cover"/> : <span class="text-xs text-slate-500 font-bold">📄</span>}
                        </label>
                        <div class="flex-1 overflow-hidden">
                            <input type="file" id={inputId} onChange={load} class="hidden" accept="image/*,application/pdf" />
                            <label htmlFor={inputId} class="inline-block px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs text-slate-200 cursor-pointer transition">Choose File</label>
                            {fileData && <button type="button" onClick={() => onFileChange(null)} class="ml-2 px-2 py-1 text-xs text-red-500 hover:bg-red-500/10 rounded transition">Remove</button>}
                            {fileData && <p class="text-[10px] text-slate-400 mt-1 truncate">{fileData.name}</p>}
                        </div>
                    </div>
                </div>
            );
        };

        const getPromptStyle = (prompt, primary) => {
            if (!prompt) return {};
            const p = prompt.toLowerCase();
            const c = primary || '#4f46e5';
            
            if (p.includes('blob')) {
                return {
                    backgroundPosition: '0 0, 100% 100%',
                    backgroundSize: '100% 100%',
                    backgroundImage: `radial-gradient(circle at 10% 20%, color-mix(in srgb, ${c} 15%, transparent) 0%, transparent 40%), radial-gradient(circle at 90% 80%, color-mix(in srgb, ${c} 15%, transparent) 0%, transparent 40%)`
                };
            }
            if (p.includes('circle')) {
                return {
                    backgroundImage: `radial-gradient(color-mix(in srgb, ${c} 15%, transparent) 2px, transparent 2px)`,
                    backgroundSize: '30px 30px'
                };
            }
            if (p.includes('grid') || p.includes('pattern')) {
                return {
                    backgroundImage: `linear-gradient(color-mix(in srgb, ${c} 10%, transparent) 1px, transparent 1px), linear-gradient(90deg, color-mix(in srgb, ${c} 10%, transparent) 1px, transparent 1px)`,
                    backgroundSize: '20px 20px'
                };
            }
            if (p.includes('gradient')) {
                return {
                    backgroundImage: `linear-gradient(135deg, transparent 0%, color-mix(in srgb, ${c} 15%, transparent) 100%)`
                };
            }
            if (p.includes('dot')) {
                return {
                    backgroundImage: `radial-gradient(color-mix(in srgb, ${c} 20%, transparent) 1px, transparent 1px)`,
                    backgroundSize: '15px 15px'
                };
            }
            return {};
        };

        const secStyle = (config, primary) => {
            const customCol = config.isCustomColorEnabled;
            const customDes = config.isCustomDesignEnabled;
            return {
                padding: `${config.paddingY}rem 0`,
                backgroundColor: customCol ? config.backgroundColor : undefined,
                color: customCol ? config.textColor : undefined,
                ...(customDes && config.prompt ? getPromptStyle(config.prompt, primary) : {})
            };
        };

        const GlobalThemeConfig = ({ design, setDesign }) => {
            const u = (k, v) => setDesign(p => ({ ...p, global: { ...p.global, [k]: v } }));
            return (
                <div class="mb-6 bg-slate-800/80 p-5 rounded border border-indigo-500/50 shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-sm">✨</span>
                        <h3 class="font-bold text-sm text-white">Global Theme Master</h3>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-xs uppercase font-bold text-slate-300">Primary Accent</span>
                            <input type="color" value={design.global.primary} onChange={e=>u('primary', e.target.value)} class="w-8 h-8 p-0 border-0 bg-transparent cursor-pointer rounded" />
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs uppercase font-bold text-slate-300">Master Background</span>
                            <input type="color" value={design.global.bg} onChange={e=>u('bg', e.target.value)} class="w-8 h-8 p-0 border-0 bg-transparent cursor-pointer rounded" />
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs uppercase font-bold text-slate-300">Master Text</span>
                            <input type="color" value={design.global.text} onChange={e=>u('text', e.target.value)} class="w-8 h-8 p-0 border-0 bg-transparent cursor-pointer rounded" />
                        </div>
                    </div>
                </div>
            );
        };

        const SectionConfig = ({ id, label, design, setDesign }) => {
            const cfg = design.sections[id];
            const update = (k, v) => setDesign(p => ({...p, sections: {...p.sections, [id]: {...cfg, [k]: v}}}));
            return (
                <div class="mb-4 bg-slate-800/40 p-4 rounded border border-slate-700/50">
                    <div class="flex items-center justify-between mb-3 border-b border-slate-700/50 pb-2">
                        <h4 class="font-bold text-sm text-slate-200">{label}</h4>
                        <label class="flex items-center gap-2 cursor-pointer text-xs text-slate-400 hover:text-white">
                            Show <input type="checkbox" checked={cfg.visible} onChange={e=>update('visible', e.target.checked)} class="accent-indigo-500" />
                        </label>
                    </div>
                    {cfg.visible && (
                        <div class="space-y-4 pt-2">
                            <div>
                                <span class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Vertical Padding: {cfg.paddingY}rem</span>
                                <input type="range" min="0" max="10" step="1" value={cfg.paddingY} onChange={e=>update('paddingY', e.target.value)} class="w-full accent-indigo-500 m-0" />
                            </div>

                            <label class="flex items-center gap-2 cursor-pointer text-xs text-indigo-300 font-bold bg-indigo-500/10 p-2 rounded border border-indigo-500/30 hover:bg-indigo-500/20 transition">
                                <input type="checkbox" checked={cfg.isCustomDesignEnabled} onChange={e=>update('isCustomDesignEnabled', e.target.checked)} class="accent-indigo-500 w-4 h-4 cursor-pointer" /> 
                                Enable Custom Design
                            </label>

                            {cfg.isCustomDesignEnabled && (
                                <div class="space-y-3 pt-2 pl-4 border-l-2 border-indigo-500/30 overflow-hidden transition-all duration-300">
                                    <div class="mb-2 relative">
                                        <input type="text" placeholder="Design style (e.g. 'gradient blobs')" value={cfg.prompt || ''} onChange={e=>update('prompt', e.target.value)} class="w-full bg-slate-900 border border-slate-700 text-slate-200 rounded px-3 py-1.5 text-xs focus:outline-none focus:border-indigo-400 pr-8" />
                                        <span class="absolute right-2 top-1.5 text-xs">🪄</span>
                                    </div>
                                </div>
                            )}

                            <label class="flex items-center gap-2 cursor-pointer text-xs text-emerald-300 font-bold bg-emerald-500/10 p-2 rounded border border-emerald-500/30 hover:bg-emerald-500/20 transition mt-3">
                                <input type="checkbox" checked={cfg.isCustomColorEnabled || false} onChange={e=>update('isCustomColorEnabled', e.target.checked)} class="accent-emerald-500 w-4 h-4 cursor-pointer" /> 
                                Enable Custom Colors
                            </label>

                            {cfg.isCustomColorEnabled && (
                                <div class="space-y-3 pt-2 pl-4 border-l-2 border-emerald-500/30 overflow-hidden transition-all duration-300">
                                    <div class="flex items-center justify-between">
                                        <span class="text-[10px] uppercase font-bold text-slate-400">Background Color</span>
                                        <input type="color" value={cfg.backgroundColor || '#000000'} onChange={e=>update('backgroundColor', e.target.value)} class="w-6 h-6 p-0 border-0 bg-transparent cursor-pointer rounded" />
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <span class="text-[10px] uppercase font-bold text-slate-400">Text Color</span>
                                        <input type="color" value={cfg.textColor || '#ffffff'} onChange={e=>update('textColor', e.target.value)} class="w-6 h-6 p-0 border-0 bg-transparent cursor-pointer rounded" />
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- PORTFOLIO COMPONENTS ---
        const secClass = "transition-all duration-300 relative z-10 hover:z-20 border border-transparent overflow-hidden";
        
        const P_Hero = ({ data, config, global }) => config.visible && (
            <section class={secClass} style={secStyle(config, global.primary)}>
                {/* Decorative Elements */}
                <div class="absolute top-10 right-10 w-6 h-6 rounded-full opacity-30" style={{backgroundColor: global.primary}}></div>
                <div class="absolute bottom-20 left-10 w-8 h-8 rounded-tr-full rounded-tl-full opacity-40 transform rotate-45" style={{backgroundColor: global.primary}}></div>
                
                <div class="max-w-7xl mx-auto px-6 flex flex-col-reverse md:flex-row items-center gap-12 py-10">
                    <div class="flex-1 text-center md:text-left relative z-10">
                        <div class="inline-block px-4 py-1.5 rounded-full mb-6 text-sm font-bold tracking-widest uppercase shadow-sm" style={{backgroundColor: 'color-mix(in srgb, ' + global.primary + ' 20%, transparent)', color: global.primary}}>
                            {data.title}
                        </div>
                        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight leading-tight">
                            Hello, I Am <br/> <span style={{color: global.primary}}>{data.name}</span>
                        </h1>
                        <p class="text-lg md:text-xl tint-text max-w-xl leading-relaxed mb-10 mx-auto md:mx-0">{data.tagline}</p>
                        <div class="flex flex-wrap justify-center md:justify-start gap-4 items-center">
                            <a href="#contact" style={{backgroundColor: global.primary, color: config.isCustomColorEnabled ? config.backgroundColor : global.bg}} class="px-8 py-4 rounded-full font-bold shadow-xl hover:-translate-y-1 hover:shadow-2xl transition-all">Hire Me</a>
                            <a href="#projects" class="px-6 py-4 font-bold hover:underline transition underline-offset-4" style={{color: config.isCustomColorEnabled ? config.textColor : global.text}}>See My Work ↗</a>
                        </div>
                    </div>
                    <div class="flex-1 relative flex justify-center py-10 w-full">
                        {/* Background Blob */}
                        <div class="absolute inset-0 z-0 m-auto w-full max-w-md aspect-square rounded-full transition-all duration-500 blur-3xl opacity-20" style={{backgroundColor: global.primary}}></div>
                        {/* Solid Offset Arch/Blob */}
                        <div class="absolute bottom-0 md:right-0 w-3/4 h-3/4 rounded-full z-0 opacity-80" style={{backgroundColor: global.primary}}></div>
                        
                        {data.image?.data ? 
                            <img src={data.image.data} alt="Profile" class="w-64 h-64 md:w-96 md:h-96 lg:w-[450px] lg:h-[450px] rounded-[3rem] object-cover relative z-10 shadow-2xl border-8" style={{borderColor: config.isCustomColorEnabled ? config.backgroundColor : global.bg}} />
                            : <div class="w-64 h-64 md:w-96 md:h-96 rounded-[3rem] relative z-10 shadow-2xl border-8 flex items-center justify-center text-4xl" style={{borderColor: config.isCustomColorEnabled ? config.backgroundColor : global.bg, backgroundColor: 'color-mix(in srgb, currentColor 5%, transparent)'}}>👨‍💻</div>
                        }
                    </div>
                </div>
            </section>
        );

        const P_About = ({ data, config, global }) => config.visible && (
            <section id="about" class={secClass} style={secStyle(config, global.primary)}>
                <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row gap-12 items-center">
                    <div class="flex-1 relative w-full">
                         <div class="absolute -top-4 -left-4 w-full h-full rounded-[2rem] border-4 opacity-30 pointer-events-none" style={{borderColor: global.primary}}></div>
                         <div class="p-8 md:p-12 rounded-[2rem] tint-card backdrop-blur-sm relative z-10 shadow-xl text-center md:text-left">
                             <h3 class="text-3xl font-bold mb-6" style={{color: global.primary}}>About Me</h3>
                             <p class="text-lg leading-relaxed tint-text whitespace-pre-wrap">{data}</p>
                         </div>
                    </div>
                </div>
            </section>
        );

        const P_Skills = ({ data, config, global }) => config.visible && (
            <section id="skills" class={secClass} style={secStyle(config, global.primary)}>
                <div class="max-w-6xl mx-auto px-6">
                    <div class="text-center mb-16 relative">
                        <span class="text-sm font-bold uppercase tracking-widest mb-2 block" style={{color: global.primary}}>My Expertise</span>
                        <h3 class="text-4xl md:text-5xl font-extrabold leading-tight">Provide Wide Range of <br/> Digital Services</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {['languages', 'frameworks', 'tools'].map(cat => (
                            <div key={cat} class="tint-card p-8 rounded-[2rem] shadow-lg hover:-translate-y-2 hover:shadow-2xl transition-all duration-300 relative overflow-hidden group flex flex-col items-center md:items-start text-center md:text-left border border-[color-mix(in_srgb,currentColor_5%,transparent)]">
                                <div class="w-20 h-20 rounded-2xl mb-8 flex items-center justify-center text-4xl shadow-md transition-colors duration-500" style={{backgroundColor: 'color-mix(in srgb, ' + global.primary + ' 15%, transparent)', color: global.primary}}>
                                    {cat === 'languages' ? '💻' : cat === 'frameworks' ? '⚛️' : '🛠️'}
                                </div>
                                <h4 class="font-bold text-2xl capitalize mb-4 relative z-10">{cat}</h4>
                                <div class="flex flex-wrap justify-center md:justify-start gap-2 relative z-10">
                                    {(data[cat]||'').split(',').map((s,i) => s.trim() ? <span key={i} class="tint-card px-4 py-2 rounded-xl text-sm font-bold shadow-sm">{s.trim()}</span> : null)}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const P_Projects = ({ data, config, global }) => config.visible && (
            <section id="projects" class={secClass} style={secStyle(config, global.primary)}>
                <div class="absolute inset-0 z-0 opacity-10 blur-3xl rounded-full max-w-lg mx-auto transform translate-y-32" style={{backgroundColor: global.primary}}></div>
                <div class="max-w-7xl mx-auto px-6 relative z-10">
                    <div class="text-center mb-16">
                         <span class="text-sm font-bold uppercase tracking-widest mb-2 block" style={{color: global.primary}}>Creative Works</span>
                         <h3 class="text-4xl md:text-5xl font-extrabold">Check My Portfolio</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {data.map(p => (
                            <div key={p.id} class="tint-card rounded-[2rem] overflow-hidden group shadow-xl hover:-translate-y-2 hover:shadow-2xl transition-all duration-300 flex flex-col border border-[color-mix(in_srgb,currentColor_5%,transparent)]">
                                <div class="h-56 flex items-center justify-center p-6 relative overflow-hidden" style={{backgroundImage: `linear-gradient(to bottom right, color-mix(in srgb, ${global.primary} 20%, transparent), transparent)`}}>
                                     <h4 class="text-3xl font-black text-center relative z-10 transform group-hover:scale-110 group-hover:-translate-y-2 transition-transform duration-500 drop-shadow-md" style={{color: global.primary}}>{p.title}</h4>
                                </div>
                                <div class="p-8 flex-1 flex flex-col backdrop-blur-sm">
                                    <p class="tint-text leading-relaxed mb-8 whitespace-pre-wrap flex-1">{p.description}</p>
                                    <div class="flex flex-wrap gap-2 mb-8">
                                        {(p.techStack||'').split(',').map((t,i) => t.trim() ? <span key={i} class="text-[10px] font-black uppercase tracking-widest tint-text tint-card px-3 py-1.5 rounded-lg border-0">{t.trim()}</span> : null)}
                                    </div>
                                    <div class="flex gap-4 items-center">
                                        {p.liveLink && <a href={p.liveLink} target="_blank" class="px-6 py-2.5 rounded-full text-sm font-bold shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all" style={{backgroundColor: global.primary, color: config.isCustomColorEnabled ? config.backgroundColor : global.bg}}>Live Demo</a>}
                                        {p.githubLink && <a href={p.githubLink} target="_blank" class="text-sm font-bold hover:underline opacity-80 hover:opacity-100 transition-opacity" style={{color: config.isCustomColorEnabled ? config.textColor : global.text}}>GitHub ↗</a>}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const P_Experience = ({ data, config, global }) => config.visible && data.length > 0 && (
            <section id="experience" class={secClass} style={secStyle(config, global.primary)}>
                <div class="max-w-6xl mx-auto px-6">
                    <div class="text-center mb-16">
                        <span class="text-sm font-bold uppercase tracking-widest mb-2 block" style={{color: global.primary}}>Career Path</span>
                        <h3 class="text-4xl font-extrabold">Professional Experience</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {data.map(exp => (
                            <div key={exp.id} class="tint-card p-8 rounded-[2rem] shadow-lg hover:-translate-y-1 hover:shadow-xl transition-all relative group overflow-hidden border border-[color-mix(in_srgb,currentColor_5%,transparent)]">
                                <div class="absolute top-0 right-0 w-32 h-32 rounded-bl-full flex items-start justify-end p-6 opacity-10 transition-opacity group-hover:opacity-20" style={{backgroundColor: global.primary}}><span class="text-4xl translate-x-4 -translate-y-4 inline-block">💼</span></div>
                                <span class="inline-block px-4 py-1.5 rounded-full text-xs font-bold mb-6 shadow-sm" style={{backgroundColor: 'color-mix(in srgb, ' + global.primary + ' 15%, transparent)', color: global.primary}}>{exp.duration}</span>
                                <h4 class="text-2xl font-bold mb-2">{exp.role}</h4>
                                <h5 class="opacity-60 font-black uppercase tracking-widest text-xs mb-6">{exp.company}</h5>
                                <p class="tint-text leading-relaxed whitespace-pre-wrap relative z-10">{exp.description}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const P_Certifications = ({ data, config, global }) => config.visible && data.length > 0 && (
            <section id="certifications" class={secClass} style={secStyle(config, global.primary)}>
                <div class="max-w-6xl mx-auto px-6">
                    <div class="text-center mb-16">
                        <span class="text-sm font-bold uppercase tracking-widest mb-2 block" style={{color: global.primary}}>Achievements</span>
                        <h3 class="text-4xl font-extrabold">Certifications</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {data.map(cert => (
                            <div key={cert.id} class="tint-card rounded-[2rem] overflow-hidden flex flex-col md:flex-row hover:-translate-y-2 transition-all duration-300 shadow-lg hover:shadow-2xl group border border-[color-mix(in_srgb,currentColor_5%,transparent)]">
                                {cert.file?.isImage ? (
                                    <div class="w-full md:w-1/3 h-48 md:h-auto shrink-0 overflow-hidden relative" style={{backgroundColor: 'color-mix(in srgb, currentColor 5%, transparent)'}}>
                                        <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition duration-300 z-10"></div>
                                        <img src={cert.file.data} class="w-full h-full object-cover group-hover:scale-110 transition duration-500 relative z-0" />
                                    </div>
                                ) : (
                                    <div class="w-full md:w-1/3 h-48 md:h-auto shrink-0 flex items-center justify-center text-5xl opacity-80" style={{backgroundImage: `linear-gradient(to bottom right, color-mix(in srgb, ${global.primary} 30%, transparent), transparent)`}}>🎓</div>
                                )}
                                <div class="p-8 flex-1 flex flex-col justify-center relative bg-transparent">
                                    <h4 class="text-xl font-bold mb-2 relative z-10">{cert.name}</h4>
                                    <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4 mb-4 relative z-10">
                                        <h5 class="font-black uppercase tracking-widest text-xs" style={{color: global.primary}}>{cert.issuer}</h5>
                                        <span class="text-[10px] font-mono tint-card px-2 py-1 rounded-md border-0">{cert.date}</span>
                                    </div>
                                    <p class="tint-text text-sm leading-relaxed whitespace-pre-wrap flex-1 mb-6 relative z-10">{cert.description}</p>
                                    
                                    {cert.file && !cert.file.isImage && (
                                        <a href={cert.file.data} download={cert.file.name} class="mt-auto pl-0 text-xs font-bold uppercase tracking-widest hover:translate-x-1 transition-transform inline-block w-fit" style={{color: global.primary}}>Download Doc →</a>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const P_Education = ({ data, config, global }) => config.visible && data.length > 0 && (
            <section id="education" class={secClass} style={secStyle(config, global.primary)}>
                <div class="max-w-6xl mx-auto px-6">
                    <div class="text-center mb-16">
                        <span class="text-sm font-bold uppercase tracking-widest mb-2 block" style={{color: global.primary}}>Academics</span>
                        <h3 class="text-4xl font-extrabold">Education</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {data.map(edu => (
                            <div key={edu.id} class="tint-card p-8 rounded-[2rem] flex flex-col sm:flex-row justify-between sm:items-center gap-6 hover:-translate-y-1 hover:shadow-xl transition-all shadow-md border border-[color-mix(in_srgb,currentColor_5%,transparent)]">
                                <div>
                                    <h4 class="text-xl font-bold mb-1">{edu.degree}</h4>
                                    <h5 class="tint-text font-medium text-sm">{edu.institution}</h5>
                                </div>
                                <span class="tint-card border-0 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest inline-block text-center shadow-inner whitespace-nowrap">{edu.year}</span>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const P_Contact = ({ data, config, global }) => config.visible && (
            <section id="contact" class={secClass} style={secStyle(config, global.primary)}>
                <div class="max-w-6xl mx-auto px-6">
                    <div class="text-center mb-16">
                        <span class="text-sm font-bold uppercase tracking-widest mb-2 block" style={{color: global.primary}}>Get In Touch</span>
                        <h3 class="text-4xl md:text-5xl font-extrabold pb-2">Any Questions? <br/>Feel Free to Contact</h3>
                    </div>
                    <div class="flex flex-col lg:flex-row shadow-2xl rounded-[3rem] overflow-hidden tint-card border border-[color-mix(in_srgb,currentColor_5%,transparent)]">
                        {/* LEFT SIDE */}
                        <div class="lg:w-2/5 p-12 flex flex-col justify-center relative overflow-hidden text-white" style={{backgroundColor: global.primary}}>
                            <div class="absolute top-0 right-0 w-64 h-64 rounded-full filter blur-3xl opacity-50" style={{backgroundColor: 'rgba(255,255,255,0.2)', transform: 'translate(30%, -30%)'}}></div>
                            <div class="absolute bottom-0 left-0 w-48 h-48 rounded-full filter blur-3xl opacity-50" style={{backgroundColor: 'rgba(255,255,255,0.2)', transform: 'translate(-30%, 30%)'}}></div>
                            
                            <h4 class="text-3xl font-black mb-10 relative z-10 tracking-tight">Contact Info</h4>
                            <div class="space-y-8 relative z-10">
                                {data.email && (
                                    <div class="flex items-center gap-6 group hover:translate-x-2 transition-transform">
                                        <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center text-xl shadow-inner group-hover:bg-white/30 transition-colors">✉️</div>
                                        <div>
                                            <p class="text-[10px] opacity-70 uppercase tracking-widest mb-1 font-bold">Email</p>
                                            <a href={`mailto:${data.email}`} class="font-bold text-lg hover:opacity-80 transition-opacity">{data.email}</a>
                                        </div>
                                    </div>
                                )}
                                {data.linkedin && (
                                    <div class="flex items-center gap-6 group hover:translate-x-2 transition-transform">
                                        <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center text-xl shadow-inner group-hover:bg-white/30 transition-colors">🔗</div>
                                        <div>
                                            <p class="text-[10px] opacity-70 uppercase tracking-widest mb-1 font-bold">LinkedIn</p>
                                            <a href={data.linkedin} target="_blank" class="font-bold text-lg hover:opacity-80 transition-opacity whitespace-nowrap overflow-hidden text-ellipsis max-w-[200px] block">View Profile</a>
                                        </div>
                                    </div>
                                )}
                                {data.github && (
                                    <div class="flex items-center gap-6 group hover:translate-x-2 transition-transform">
                                        <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center text-xl shadow-inner group-hover:bg-white/30 transition-colors">💻</div>
                                        <div>
                                            <p class="text-[10px] opacity-70 uppercase tracking-widest mb-1 font-bold">GitHub</p>
                                            <a href={data.github} target="_blank" class="font-bold text-lg hover:opacity-80 transition-opacity">View Profile</a>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        {/* RIGHT SIDE */}
                        <div class="lg:w-3/5 p-12 md:p-16 flex flex-col justify-center">
                            <form class="space-y-6" onSubmit={e=>e.preventDefault()}>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <input type="text" placeholder="Your Name" class="w-full border-none rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 transition-all shadow-inner tint-card" style={{color: config.isCustomColorEnabled ? config.textColor : global.text, '--tw-ring-color': global.primary}} />
                                    <input type="email" placeholder="Your Email" class="w-full border-none rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 transition-all shadow-inner tint-card" style={{color: config.isCustomColorEnabled ? config.textColor : global.text, '--tw-ring-color': global.primary}} />
                                </div>
                                <input type="text" placeholder="Subject" class="w-full border-none rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 transition-all shadow-inner tint-card" style={{color: config.isCustomColorEnabled ? config.textColor : global.text, '--tw-ring-color': global.primary}} />
                                <textarea placeholder="Message" rows="5" class="w-full border-none rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 transition-all shadow-inner resize-none tint-card" style={{color: config.isCustomColorEnabled ? config.textColor : global.text, '--tw-ring-color': global.primary}}></textarea>
                                <button class="px-10 py-4 rounded-full font-bold shadow-xl hover:-translate-y-1 hover:shadow-2xl transition-all" style={{backgroundColor: global.primary, color: config.isCustomColorEnabled ? config.backgroundColor : global.bg}}>Submit Message</button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        );

        const P_Footer = ({ heroData, config, global }) => config.visible && (
            <footer class={secClass + " border-t border-[color-mix(in_srgb,currentColor_15%,transparent)]"} style={{...secStyle(config, global.primary), backgroundColor: 'color-mix(in srgb, currentColor 2%, transparent)', backdropFilter: 'blur(10px)'}}>
                <div class="max-w-6xl mx-auto px-6 py-10 flex flex-col md:flex-row items-center justify-between gap-6 text-center md:text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-black shadow-md" style={{backgroundColor: global.primary, color: config.isCustomColorEnabled ? config.backgroundColor : global.bg}}>{heroData.name.charAt(0)}</div>
                        <h4 class="font-extrabold tracking-widest uppercase">{heroData.name}</h4>
                    </div>
                    <ul class="flex flex-wrap items-center justify-center gap-6 text-sm font-bold opacity-70">
                        <li><a href="#about" class="hover:opacity-100 transition">About</a></li>
                        <li><a href="#skills" class="hover:opacity-100 transition">Skills</a></li>
                        <li><a href="#projects" class="hover:opacity-100 transition">Portfolio</a></li>
                        <li><a href="#contact" class="hover:opacity-100 transition">Contact</a></li>
                    </ul>
                    <p class="text-xs font-medium opacity-50">&copy; {new Date().getFullYear()} All Rights Reserved.</p>
                </div>
            </footer>
        );
// --- MAIN APP ---
        const App = () => {
            const [tab, setTab] = useState('design');

            const [data, setData] = useState({
                hero: { name: "Jane Developer", title: "Software Engineer", tagline: "Crafting beautiful and scalable web experiences.", image: null },
                about: "I am a dedicated software engineer with a strong foundation in modern web technologies. I thrive in dynamic environments where I can solve complex problems and deliver high-quality code.",
                skills: { languages: "JavaScript, Python, C++", frameworks: "React, Next.js, Django", tools: "Git, Docker, Figma" },
                projects: [
                    { id: 1, title: "Modern E-Commerce App", description: "A scalable platform built with Next.js and Stripe.", techStack: "React, Node, Tailwind", githubLink: "#", liveLink: "#" }
                ],
                experience: [
                    { id: 1, role: "Frontend Developer", company: "WebTech Agency", duration: "2022 - Present", description: "Led the rewriting of the main customer portal, improving performance scores by 35%." }
                ],
                certifications: [
                    { id: 1, name: "AWS Certified Solutions Architect", issuer: "Amazon Web Services", date: "April 2023", description: "Validated expertise in designing distributed systems.", file: null }
                ],
                education: [
                    { id: 1, degree: "B.S. in Computer Science", institution: "Tech University", year: "2018 - 2022" }
                ],
                contact: { email: "hello@example.com", linkedin: "https://linkedin.com", github: "https://github.com" }
            });

            // Separate toggles for Custom Design (patterns) and Custom Colors (strict colors)
            const [design, setDesign] = useState({
                font: 'Inter',
                global: { primary: '#6366f1', bg: '#0f172a', text: '#f8fafc' },
                sections: {
                    hero: { visible: true, isCustomDesignEnabled: true, prompt: 'add gradient blobs', isCustomColorEnabled: true, backgroundColor: '#171e36', textColor: '#f8fafc', paddingY: '8' },
                    about: { visible: true, isCustomDesignEnabled: false, prompt: '', isCustomColorEnabled: false, backgroundColor: '#1e293b', textColor: '#e2e8f0', paddingY: '6' },
                    skills: { visible: true, isCustomDesignEnabled: true, prompt: 'add grid pattern', isCustomColorEnabled: true, backgroundColor: '#0d1324', textColor: '#f8fafc', paddingY: '6' },
                    projects: { visible: true, isCustomDesignEnabled: false, prompt: '', isCustomColorEnabled: false, backgroundColor: '#1e293b', textColor: '#e2e8f0', paddingY: '6' },
                    experience: { visible: true, isCustomDesignEnabled: false, prompt: 'soft circles', isCustomColorEnabled: false, backgroundColor: '#0f172a', textColor: '#f8fafc', paddingY: '6' },
                    certifications: { visible: true, isCustomDesignEnabled: false, prompt: '', isCustomColorEnabled: false, backgroundColor: '#1e293b', textColor: '#e2e8f0', paddingY: '6' },
                    education: { visible: true, isCustomDesignEnabled: false, prompt: 'scattered dots', isCustomColorEnabled: false, backgroundColor: '#0f172a', textColor: '#f8fafc', paddingY: '4' },
                    contact: { visible: true, isCustomDesignEnabled: false, prompt: '', isCustomColorEnabled: false, backgroundColor: '#1e293b', textColor: '#f8fafc', paddingY: '8' },
                    footer: { visible: true, isCustomDesignEnabled: false, prompt: '', isCustomColorEnabled: false, backgroundColor: '#0f172a', textColor: '#94a3b8', paddingY: '2' },
                }
            });

            const u = (sec, k, v) => setData(p => ({ ...p, [sec]: { ...p[sec], [k]: v } }));
            const uList = (lst, id, k, v) => setData(p => ({ ...p, [lst]: p[lst].map(i => i.id === id ? { ...i, [k]: v } : i) }));
            const addList = (lst, def) => setData(p => ({ ...p, [lst]: [...p[lst], { id: Date.now(), ...def }] }));
            const remList = (lst, id) => setData(p => ({ ...p, [lst]: p[lst].filter(i => i.id !== id) }));

            const downloadHTML = () => {
                const root = document.getElementById('preview-container');
                if(!root) return;
                
                let pureHTML = root.innerHTML;
                
                const htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${data.hero.name} - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: '${design.font}', sans-serif; background-color: ${design.global.bg}; color: ${design.global.text}; margin: 0; min-height: 100vh;}
      .tint-card { background-color: color-mix(in srgb, currentColor 5%, transparent); border: 1px solid color-mix(in srgb, currentColor 15%, transparent); }
      .tint-text { color: color-mix(in srgb, currentColor 70%, transparent); }
      html { scroll-behavior: smooth; }
    </style>
</head>
<body class="antialiased">
    ${pureHTML}
</body>
</html>`;
                const b = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(b);
                const a = document.createElement('a');
                a.href = url; a.download = 'portfolio.html';
                a.click(); URL.revokeObjectURL(url);
            };

            return (
                <div class="flex flex-col md:flex-row h-screen overflow-hidden">
                    {/* BUILDER SIDEBAR */}
                    <div class="w-full md:w-[450px] bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 z-20 shadow-2xl">
                        <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900">
                            <h1 class="text-lg font-bold">Portfolio Gen</h1>
                            <button onClick={downloadHTML} class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded text-xs font-bold transition shadow-lg">Export HTML</button>
                        </div>
                        <div class="p-3 border-b border-slate-800 bg-slate-800/50">
                            <div class="flex bg-slate-900 rounded p-1">
                                <button onClick={()=>setTab('content')} className={`flex-1 py-1.5 text-xs font-bold rounded ${tab==='content' ? 'bg-slate-700 text-white' : 'text-slate-400'}`}>Content</button>
                                <button onClick={()=>setTab('design')} className={`flex-1 py-1.5 text-xs font-bold rounded ${tab==='design' ? 'bg-slate-700 text-white' : 'text-slate-400'}`}>Design & Layout</button>
                            </div>
                        </div>

                        <div class="flex-1 overflow-y-auto p-5 custom-scrollbar pb-32">
                            {tab === 'content' && (
                                <div class="space-y-6">
                                    <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50">
                                        <h3 class="font-bold text-sm mb-4 border-b border-slate-700 pb-2">Hero Section</h3>
                                        <FileUpload fileData={data.hero.image} onFileChange={v => u('hero', 'image', v)} label="Profile Image" />
                                        <InputField label="Name" value={data.hero.name} onChange={e=>u('hero','name',e.target.value)} />
                                        <InputField label="Title" value={data.hero.title} onChange={e=>u('hero','title',e.target.value)} />
                                        <InputField label="Tagline" isTextarea value={data.hero.tagline} onChange={e=>u('hero','tagline',e.target.value)} />
                                    </div>

                                    <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50">
                                        <h3 class="font-bold text-sm mb-4 border-b border-slate-700 pb-2">About Section</h3>
                                        <InputField label="Biography" isTextarea value={data.about} onChange={e=>setData(p=>({...p, about: e.target.value}))} />
                                    </div>

                                    <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50">
                                        <h3 class="font-bold text-sm mb-4 border-b border-slate-700 pb-2">Skills Setup</h3>
                                        <InputField label="Languages (CSV)" value={data.skills.languages} onChange={e=>u('skills','languages',e.target.value)} />
                                        <InputField label="Frameworks (CSV)" value={data.skills.frameworks} onChange={e=>u('skills','frameworks',e.target.value)} />
                                        <InputField label="Tools (CSV)" value={data.skills.tools} onChange={e=>u('skills','tools',e.target.value)} />
                                    </div>

                                    <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50">
                                        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                                            <h3 class="font-bold text-sm">Projects List</h3>
                                            <button onClick={()=>addList('projects', {title:'', description:'', techStack:'', githubLink:'', liveLink:''})} class="text-xs text-indigo-400 hover:text-white bg-indigo-500/10 px-2 py-1 rounded">+ Add</button>
                                        </div>
                                        <div class="space-y-4">
                                            {data.projects.map(p => (
                                                <div key={p.id} class="bg-slate-900 border border-slate-700 p-3 rounded relative">
                                                    <button onClick={()=>remList('projects', p.id)} class="absolute top-2 right-2 text-red-500 text-xs hover:underline">Remove</button>
                                                    <InputField label="Title" value={p.title} onChange={e=>uList('projects', p.id, 'title', e.target.value)} />
                                                    <InputField label="Description" isTextarea value={p.description} onChange={e=>uList('projects', p.id, 'description', e.target.value)} />
                                                    <InputField label="Tech (CSV)" value={p.techStack} onChange={e=>uList('projects', p.id, 'techStack', e.target.value)} />
                                                    <InputField label="GitHub URL" value={p.githubLink} onChange={e=>uList('projects', p.id, 'githubLink', e.target.value)} />
                                                    <InputField label="Live URL" value={p.liveLink} onChange={e=>uList('projects', p.id, 'liveLink', e.target.value)} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50">
                                        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                                            <h3 class="font-bold text-sm">Experience List</h3>
                                            <button onClick={()=>addList('experience', {role:'', company:'', duration:'', description:''})} class="text-xs text-indigo-400 hover:text-white bg-indigo-500/10 px-2 py-1 rounded">+ Add</button>
                                        </div>
                                        <div class="space-y-4">
                                            {data.experience.map(e => (
                                                <div key={e.id} class="bg-slate-900 border border-slate-700 p-3 rounded relative">
                                                    <button onClick={()=>remList('experience', e.id)} class="absolute top-2 right-2 text-red-500 text-xs hover:underline">Remove</button>
                                                    <InputField label="Role" value={e.role} onChange={ev=>uList('experience', e.id, 'role', ev.target.value)} />
                                                    <InputField label="Company" value={e.company} onChange={ev=>uList('experience', e.id, 'company', ev.target.value)} />
                                                    <InputField label="Duration" value={e.duration} onChange={ev=>uList('experience', e.id, 'duration', ev.target.value)} />
                                                    <InputField label="Description" isTextarea value={e.description} onChange={ev=>uList('experience', e.id, 'description', ev.target.value)} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50 border-l-4 border-l-indigo-500">
                                        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                                            <h3 class="font-bold text-sm text-indigo-100">Certifications</h3>
                                            <button onClick={()=>addList('certifications', {name:'', issuer:'', date:'', description:'', file:null})} class="text-xs text-indigo-400 hover:text-white bg-indigo-500/10 px-2 py-1 rounded">+ Add</button>
                                        </div>
                                        <div class="space-y-4">
                                            {data.certifications.map(c => (
                                                <div key={c.id} class="bg-slate-900 border border-slate-700 p-3 rounded relative">
                                                    <button onClick={()=>remList('certifications', c.id)} class="absolute top-2 right-2 text-red-500 text-xs hover:underline">Remove</button>
                                                    <InputField label="Cert Name" value={c.name} onChange={ev=>uList('certifications', c.id, 'name', ev.target.value)} />
                                                    <InputField label="Issuer" value={c.issuer} onChange={ev=>uList('certifications', c.id, 'issuer', ev.target.value)} />
                                                    <InputField label="Date" value={c.date} onChange={ev=>uList('certifications', c.id, 'date', ev.target.value)} />
                                                    <InputField label="Description" isTextarea value={c.description} onChange={ev=>uList('certifications', c.id, 'description', ev.target.value)} />
                                                    <FileUpload label="Upload Cert (PDF/Img)" fileData={c.file} onFileChange={v => uList('certifications', c.id, 'file', v)} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50">
                                        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                                            <h3 class="font-bold text-sm">Education List</h3>
                                            <button onClick={()=>addList('education', {degree:'', institution:'', year:''})} class="text-xs text-indigo-400 hover:text-white bg-indigo-500/10 px-2 py-1 rounded">+ Add</button>
                                        </div>
                                        <div class="space-y-4">
                                            {data.education.map(e => (
                                                <div key={e.id} class="bg-slate-900 border border-slate-700 p-3 rounded relative">
                                                    <button onClick={()=>remList('education', e.id)} class="absolute top-2 right-2 text-red-500 text-xs hover:underline">Remove</button>
                                                    <InputField label="Degree" value={e.degree} onChange={ev=>uList('education', e.id, 'degree', ev.target.value)} />
                                                    <InputField label="Institution" value={e.institution} onChange={ev=>uList('education', e.id, 'institution', ev.target.value)} />
                                                    <InputField label="Year" value={e.year} onChange={ev=>uList('education', e.id, 'year', ev.target.value)} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50">
                                        <h3 class="font-bold text-sm mb-4 border-b border-slate-700 pb-2">Contact Links</h3>
                                        <InputField label="Email" type="email" value={data.contact.email} onChange={e=>u('contact','email',e.target.value)} />
                                        <InputField label="LinkedIn" value={data.contact.linkedin} onChange={e=>u('contact','linkedin',e.target.value)} />
                                        <InputField label="GitHub" value={data.contact.github} onChange={e=>u('contact','github',e.target.value)} />
                                    </div>
                                </div>
                            )}

                            {tab === 'design' && (
                                <div>
                                    <GlobalThemeConfig design={design} setDesign={setDesign} />

                                    <div class="mb-6 bg-slate-800/50 p-4 rounded border border-slate-700/50">
                                        <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider">Site Typography</label>
                                        <select value={design.font} onChange={e=>setDesign(p=>({...p, font: e.target.value}))} class="w-full bg-slate-900 text-white border border-slate-700 rounded px-3 py-2 text-sm focus:outline-none">
                                            {['Inter', 'Roboto', 'Playfair Display'].map(f => <option key={f} value={f}>{f}</option>)}
                                        </select>
                                    </div>

                                    {Object.keys(design.sections).map(sec => (
                                        <SectionConfig key={sec} id={sec} label={sec.charAt(0).toUpperCase() + sec.slice(1) + " Section"} design={design} setDesign={setDesign} />
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* RIGHT PREVIEW */}
                    <div class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-950 custom-scrollbar relative">
                        {/* We use id="preview-container" to extract the HTML seamlessly and guarantee 100% parity! */}
                        <div id="preview-container" style={{fontFamily: `"${design.font}", sans-serif`, backgroundColor: design.global.bg, color: design.global.text, minHeight: '100%', transition: 'background-color 0.5s'}}>
                            <P_Hero data={data.hero} config={design.sections.hero} global={design.global} />
                            <P_About data={data.about} config={design.sections.about} global={design.global} />
                            <P_Skills data={data.skills} config={design.sections.skills} global={design.global} />
                            <P_Projects data={data.projects} config={design.sections.projects} global={design.global} />
                            <P_Experience data={data.experience} config={design.sections.experience} global={design.global} />
                            <P_Certifications data={data.certifications} config={design.sections.certifications} global={design.global} />
                            <P_Education data={data.education} config={design.sections.education} global={design.global} />
                            <P_Contact data={data.contact} config={design.sections.contact} global={design.global} />
                            <P_Footer heroData={data.hero} config={design.sections.footer} global={design.global} />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
